name: Build and Deploy Backend

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: hankstank
  REGION: us-central1
  SERVICE_NAME: hanks-tank-backend

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Force public npm registry
        run: |
          cat <<'EOF' > "$RUNNER_TEMP/.npmrc"
          registry=https://registry.npmjs.org/
          EOF
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/.npmrc
      
      - name: Install dependencies
        run: npm ci
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/.npmrc
          NODE_AUTH_TOKEN: ''
      
      - name: Run linter
        run: npm run lint --if-present
      
      - name: Run tests
        run: npm test --if-present
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/.npmrc
          NODE_AUTH_TOKEN: ''
      
      - name: Build TypeScript
        run: npm run build
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/.npmrc
          NODE_AUTH_TOKEN: ''

  deploy:
    name: Deploy to Google Cloud
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Force public npm registry
        run: |
          cat <<'EOF' > "$RUNNER_TEMP/.npmrc"
          registry=https://registry.npmjs.org/
          EOF
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/.npmrc
      
      - name: Install dependencies
        run: npm ci
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/.npmrc
          NODE_AUTH_TOKEN: ''
      
      - name: Build TypeScript
        run: npm run build
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/.npmrc
          NODE_AUTH_TOKEN: ''
      
      - name: Validate deploy auth configuration
        id: deploy-auth
        run: |
          if [ -n "${GCP_SA_KEY}" ] && { [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ] || [ -n "${GCP_SERVICE_ACCOUNT}" ]; }; then
            echo "::error::Configure exactly one GCP auth method: either GCP_SA_KEY or GCP_WORKLOAD_IDENTITY_PROVIDER plus GCP_SERVICE_ACCOUNT."
            exit 1
          fi

          if [ -n "${GCP_SA_KEY}" ]; then
            echo "auth_mode=key" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ] && [ -n "${GCP_SERVICE_ACCOUNT}" ]; then
            echo "auth_mode=wif" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ] || [ -n "${GCP_SERVICE_ACCOUNT}" ]; then
            echo "::error::Both GCP_WORKLOAD_IDENTITY_PROVIDER and GCP_SERVICE_ACCOUNT are required for workload identity authentication."
            exit 1
          fi

          echo "auth_mode=none" >> "$GITHUB_OUTPUT"
          echo "::notice::Skipping App Engine deploy because no GCP deploy credentials are configured."

      - name: Authenticate to Google Cloud with service account key
        if: steps.deploy-auth.outputs.auth_mode == 'key'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Authenticate to Google Cloud with workload identity
        if: steps.deploy-auth.outputs.auth_mode == 'wif'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
      
      - name: Set up Cloud SDK
        if: steps.deploy-auth.outputs.auth_mode != 'none'
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Deploy to App Engine
        if: steps.deploy-auth.outputs.auth_mode != 'none'
        run: gcloud app deploy --quiet --project=${{ env.PROJECT_ID }}
