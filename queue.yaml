queue:
- name: statcast-collection
  mode: push
  rate: 10/m  # Process 10 tasks per minute (6 seconds between tasks)
  retry_parameters:
    task_retry_limit: 3
    task_age_limit: 2h  # Max 2 hours for task to complete
    min_backoff_seconds: 60
    max_backoff_seconds: 300
    max_doublings: 3
  max_concurrent_requests: 3  # Run up to 3 tasks concurrently
  target: default  # Use default App Engine service

- name: lineup-pregame
  mode: push
  # Each game fires one task; up to 15 games per day, staggered 90 min pre-game
  rate: 30/m
  retry_parameters:
    task_retry_limit: 2      # 2 retries (lineups are time-sensitive)
    task_age_limit: 3h       # Task expires 3 hours after creation
    min_backoff_seconds: 120 # 2-minute retry delay
    max_backoff_seconds: 600
    max_doublings: 2
  max_concurrent_requests: 5 # Multiple games can start near-simultaneously
  target: default
